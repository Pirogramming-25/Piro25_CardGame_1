{% extends "base.html" %}
{% load static %}
 
{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
{% endblock %}
 
{% block content %}
<div class="main-hero">
    <h1 class="main-title">CARD GAME</h1>
 
    {% if user.is_authenticated %}
        <p class="main-subtitle">hello, <span class="main-user-info">{{ user.username }}</span>! Do you want to play the game?</p>
        <div class="main-button">
            <a href="{% url 'attack_page' %}" class="main-cta-button">start</a>
            <a href="#" class="main-cta-button">list</a>
        </div>
    {% else %}
        <p class="main-subtitle">Do you want to play the game?</p>
        <a href="{% url 'login' %}" class="main-cta-button">start</a>
    {% endif %}
</div>
{% endblock %}
