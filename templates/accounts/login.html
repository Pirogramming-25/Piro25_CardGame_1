{% extends "base.html" %}
{% load socialaccount %}
{% block content %}
<h1 class="text-2xl font-bold mb-6 text-gray-800">로그인</h1>

<form method="post" class="flex flex-col gap-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-indigo-500 hover:bg-indigo-600 text-white py-2 rounded font-semibold">로그인</button>
</form>

<div class="flex items-center gap-3 my-5">
    <hr class="flex-grow border-gray-200">
    <span class="text-gray-400 text-sm">또는</span>
    <hr class="flex-grow border-gray-200">
</div>

<a href="{% provider_login_url 'kakao' %}"
    class="flex items-center justify-center gap-2 py-2 rounded font-semibold hover:brightness-95"
    style="background-color:#FEE500; color:#000000D9;">
    <svg width="18" height="18" viewBox="0 0 256 256" aria-hidden="true">
    <path fill="#000000" d="M128 36C70.6 36 24 72.7 24 118c0 29.3 19.5 55 48.7 69.5-1.6 5.5-10.2 35.3-10.6 37.7 0 0-.2 1.8.9 2.4s2.5.2 2.5.2c3.3-.5 38-24.8 44-29 6.1.9 12.3 1.3 18.4 1.3 57.4 0 104-36.7 104-82S185.4 36 128 36"/>
    </svg>
    카카오로 로그인
</a>
{% endblock %}
