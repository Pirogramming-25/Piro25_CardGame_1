{% extends "base.html" %}
{% load static %}
{% load socialaccount %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/accounts.css' %}">
{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">로그인</h1>

        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="auth-submit-button">
                로그인
            </button>
        </form>

        <div class="auth-divider">
            <hr>
            <span>또는</span>
            <hr>
        </div>

        <a href="{% provider_login_url 'kakao' %}" class="kakao-login-button">
            <svg
                class="kakao-icon"
                width="18"
                height="18"
                viewBox="0 0 256 256"
                aria-hidden="true"
            >
                <path d="M128 36C70.6 36 24 72.7 24 118c0 29.3 19.5 55 48.7 69.5-1.6 5.5-10.2 35.3-10.6 37.7 0 0-.2 1.8.9 2.4s2.5.2 2.5.2c3.3-.5 38-24.8 44-29 6.1.9 12.3 1.3 18.4 1.3 57.4 0 104-36.7 104-82S185.4 36 128 36"/>
            </svg>

            카카오로 로그인
        </a>
    </div>
</section>
{% endblock %}
