{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/accounts.css' %}">
{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">회원가입</h1>

        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="auth-submit-button">
                회원가입
            </button>
        </form>
    </div>
</section>
{% endblock %}
