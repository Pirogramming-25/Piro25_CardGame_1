{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/accounts.css' %}">
{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="profile-card">
        <h1 class="auth-title">마이페이지</h1>

        <p class="profile-greeting">
            안녕하세요, <strong>{{ user.username }}</strong>님!
        </p>

        <p class="profile-description">
            이 페이지는 로그인한 사용자만 볼 수 있습니다.
        </p>

        <p class="profile-score">
            현재 점수: {{ user.score }}점
        </p>
    </div>
</section>
{% endblock %}
