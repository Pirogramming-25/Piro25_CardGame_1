<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Login Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    input {
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 6px 10px;
        width: 100%;
        margin-top: 4px;
        outline: none;
    }
    input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
    }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow px-6 py-4 flex items-center gap-4">
    <a href="/" class="font-bold text-indigo-600 text-lg">Home</a>
    <div class="ml-auto flex items-center gap-4">
        {% if user.is_authenticated %}
        <span class="text-gray-600">안녕하세요, <b>{{ user.username }}</b>님</span>
        <a href="{% url 'profile' %}" class="text-indigo-500 hover:underline">마이페이지</a>
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm">로그아웃</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}" class="text-indigo-500 hover:underline">로그인</a>
        <a href="{% url 'signup' %}" class="bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1 rounded text-sm">회원가입</a>
        {% endif %}
    </div>
    </nav>
    <hr>
    <main class="max-w-md mx-auto mt-16 bg-white p-8 rounded-xl shadow">
    {% block content %}
    {% endblock %}
    </main>
</body>
</html>
