{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}숫자 카드 배틀{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/reset.css' %}">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <header>
    <a href="{% url 'game_list' %}" class="logo">Piro25 card game</a>

    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'game_list' %}">게임하기</a>
        <a href="{% url 'ranking' %}">랭킹보기</a>
        <span class="user-info">{{ user.username }}님</span>
        <a href="{% url 'logout' %}">로그아웃</a>
      {% else %}
        <a href="{% url 'login' %}">로그인</a>
        <a href="{% url 'signup' %}">회원가입</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% block content %}
    {% endblock %}
  </main>

  <!-- <footer>
    <p>&copy; 25기 1조 숫자 카드 배틀. All rights reserved.</p>
    <p>
      <a href="{% url 'game_list' %}">게임 리스트</a> ·
      <a href="{% url 'ranking' %}">랭킹</a>
    </p>
  </footer> -->

  {% block extra_scripts %}{% endblock %}
</body>
</html>
